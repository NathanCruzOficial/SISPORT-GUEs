{% extends "base.html" %}
{% block content %}
<div class="center-card">
  <div class="card-body">

    <div class="sheet">
      <div class="sheet-header">
        <div>
          <h2>Ficha do Visitante</h2>
          <div class="muted small">Edição de dados e foto</div>
        </div>
        <a class="btn btn-outline-secondary" href="{{ url_for('visitor.checkin_form', visitor_id=visitor.id) }}">
          Voltar
        </a>
      </div>

      <div class="p-3 p-md-4">
        <div class="row g-4">
          <!-- Foto -->
          <div class="col-12 col-lg-4">
            <div class="mb-2 fw-semibold">Foto</div>

            <div class="photo-box mb-3" style="width:160px;height:160px;">
              {% if visitor.photo_rel_path %}
                <img src="{{ url_for('visitor.uploaded_file', filename=visitor.photo_rel_path) }}?v={{ visitor.id }}" alt="Foto">
              {% else %}
                <img src="{{ url_for('static', filename='img/avatar-placeholder.jpg') }}" alt="Sem foto">
              {% endif %}
            </div>

            <form method="post" action="{{ url_for('visitor.visitor_update_photo', visitor_id=visitor.id) }}">
              <input type="hidden" name="photo_data_url" id="photo_data_url">

              <div class="d-grid gap-2">
                <button type="button" class="btn btn-outline-success" id="btnOpenCam">
                  <i class="bi bi-camera-video me-1"></i>Abrir câmera
                </button>
                <button type="button" class="btn btn-success" id="btnCapture" disabled>
                  <i class="bi bi-camera me-1"></i>Capturar
                </button>
                <button type="submit" class="btn btn-primary" id="btnSavePhoto" disabled>
                  <i class="bi bi-check2-circle me-1"></i>Salvar nova foto
                </button>
              </div>

              <video id="video" class="mt-3 rounded-3 border" style="width:100%; display:none;" playsinline></video>
              <img id="preview" class="mt-3 rounded-3 border" style="width:100%; display:none;" alt="Prévia">
            </form>
          </div>

          <!-- Dados -->
          <div class="col-12 col-lg-8">
            <form method="post" action="{{ url_for('visitor.visitor_edit_post', visitor_id=visitor.id) }}">
              <div class="row g-3">
                <div class="col-12 col-md-6">
                  <label class="form-label">Nome</label>
                  <input class="form-control" name="name" value="{{ visitor.name }}" required>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">CPF</label>
                  <input class="form-control" name="cpf" value="{{ visitor.cpf }}" disabled>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Nome da Mãe</label>
                  <input class="form-control" name="mom_name" value="{{ visitor.mom_name or '' }}" required>
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Nome do Pai</label>
                  <input class="form-control" name="father_name" value="{{ visitor.father_name or '' }}" placeholder="(opcional)">
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">Telefone</label>
                  <input class="form-control" name="phone" value="{{ visitor.phone or '' }}" required autocomplete="tel" inputmode="tel">
                </div>

                <div class="col-12 col-md-6">
                  <label class="form-label">E-mail</label>
                  <input class="form-control" type="email" name="email" value="{{ visitor.email or '' }}" required autocomplete="email">
                </div>

                <div class="col-12">
                  <label class="form-label">Empresa / Vínculo</label>
                  <input class="form-control" name="empresa" value="{{ visitor.empresa or '' }}" placeholder="(opcional)">
                </div>

                <div class="col-12">
                  <div class="d-flex justify-content-end gap-2 pt-2">
                    <a class="btn btn-outline-secondary" href="{{ url_for('visitor.checkin_form', visitor_id=visitor.id) }}">
                      Cancelar
                    </a>
                    <button class="btn btn-success" type="submit">Salvar ficha</button>
                  </div>
                </div>
              </div>
            </form>

<!-- FIM DO FORMUÁRIO -->

            <hr class="my-4">

            <form method="post" action="{{ url_for('visitor.visitor_delete', visitor_id=visitor.id) }}"
                  onsubmit="return confirm('Tem certeza que deseja excluir este visitante e suas visitas?');">
              <button class="btn btn-outline-danger">
                <i class="bi bi-trash me-1"></i>Excluir visitante
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Recomendação: depois migrar isso para static/js/camera.js único.
  const btnOpen = document.getElementById('btnOpenCam');
  const btnCapture = document.getElementById('btnCapture');
  const btnSave = document.getElementById('btnSavePhoto');
  const video = document.getElementById('video');
  const preview = document.getElementById('preview');
  const input = document.getElementById('photo_data_url');
  let stream = null;

  async function openCam(){
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio:false });
    video.srcObject = stream;
    await video.play();
    video.style.display = "block";
    btnCapture.disabled = false;
  }

  function capture(){
    const c = document.createElement('canvas');
    c.width = video.videoWidth;
    c.height = video.videoHeight;
    c.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = c.toDataURL("image/jpeg", 0.85);
    input.value = dataUrl;
    preview.src = dataUrl;
    preview.style.display = "block";
    btnSave.disabled = false;
  }

  btnOpen?.addEventListener('click', () => openCam().catch(() => alert("Sem acesso à câmera. Verifique permissões do navegador.")));
  btnCapture?.addEventListener('click', capture);
  window.addEventListener("beforeunload", () => stream?.getTracks().forEach(t => t.stop()));
</script>
{% endblock %}
