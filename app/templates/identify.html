{% extends "base.html" %}
{% block content %}
<div class="center-card">
  <div class="card-body">
    <div class="d-flex justify-content-between align-items-start gap-3 mb-3">
      <div>
        <h1 class="h4 mb-1">Identificação do Visitante</h1>
        <div class="muted">Informe o CPF para buscar cadastro ou iniciar novo.</div>
      </div>
      <a class="btn btn-outline-primary" href="{{ url_for('visitor.open_visits') }}">
        Ver visitas em aberto (dar saída)
      </a>
    </div>

    <form method="post" action="{{ url_for('visitor.identify_post') }}">
      <div class="row g-3 align-items-end">
        <div class="col-12 col-md-7">
          <label class="form-label">CPF</label>
          <input class="form-control form-control-lg" name="cpf" inputmode="numeric" placeholder="000.000.000-00" required>
        </div>

        <div class="col-12 col-md-5">
          <button class="btn btn-success btn-lg w-100" type="submit">
            Continuar
          </button>
        </div>
      </div>
    </form>

  </div>
</div>
{% endblock %}
